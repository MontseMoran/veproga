<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<script>
  var l = window.location;
  var redirect = l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
    '/?redirect=' + encodeURIComponent(l.pathname + l.search + l.hash);
  window.location.replace(redirect);
</script>
</head>
<body></body>
</html>
